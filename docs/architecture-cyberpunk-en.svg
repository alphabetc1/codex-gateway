<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Codex Gateway Architecture</title>
  <desc id="desc">Cyberpunk-style architecture illustration for Codex Gateway: a local CLI reaches a VPS proxy over SSH, then the proxy accesses upstream model services.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04050b"/>
      <stop offset="45%" stop-color="#0b1022"/>
      <stop offset="100%" stop-color="#1a0817"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29d8ff"/>
      <stop offset="50%" stop-color="#ff4fd8"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
    <linearGradient id="panelCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091626"/>
      <stop offset="100%" stop-color="#08111d"/>
    </linearGradient>
    <linearGradient id="panelPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#170b2b"/>
      <stop offset="100%" stop-color="#0f091f"/>
    </linearGradient>
    <linearGradient id="panelAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#231303"/>
      <stop offset="100%" stop-color="#181004"/>
    </linearGradient>
    <linearGradient id="nodeCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10263c"/>
      <stop offset="100%" stop-color="#0a1728"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e2a23"/>
      <stop offset="100%" stop-color="#081b17"/>
    </linearGradient>
    <linearGradient id="nodeViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#28173f"/>
      <stop offset="100%" stop-color="#171124"/>
    </linearGradient>
    <linearGradient id="nodeAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2208"/>
      <stop offset="100%" stop-color="#241606"/>
    </linearGradient>
    <radialGradient id="orbLeft" cx="0%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#29d8ff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#29d8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbMid" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ff4fd8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff4fd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbRight" cx="100%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffb84d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#79f7ff" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#29d8ff" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#29d8ff" flood-opacity="0.28"/>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff4fd8" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#ff4fd8" flood-opacity="0.24"/>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffb84d" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ffb84d" flood-opacity="0.22"/>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#19f5b3" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#19f5b3" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowCyan" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M 0 2 L 14 8 L 0 14 L 4 8 Z" fill="#6ee7f9"/>
    </marker>
    <marker id="arrowAmber" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M 0 2 L 14 8 L 0 14 L 4 8 Z" fill="#ffb84d"/>
    </marker>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: "Segoe UI", "Helvetica Neue", Arial, system-ui, sans-serif; }
      .kicker { font-size: 15px; font-weight: 700; letter-spacing: 2.4px; }
      .hero { font-size: 46px; font-weight: 800; letter-spacing: 2px; }
      .subtitle { font-size: 20px; font-weight: 600; }
      .panel-tag { font-size: 15px; font-weight: 700; letter-spacing: 2.2px; }
      .panel-note { font-size: 14px; font-weight: 600; }
      .node-title { font-size: 26px; font-weight: 800; }
      .node-copy { font-size: 18px; font-weight: 600; }
      .node-meta { font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
      .provider-meta { font-size: 17px; font-weight: 600; }
      .flow-label { font-size: 14px; font-weight: 700; letter-spacing: 1.7px; }
      .footer-label { font-size: 15px; font-weight: 700; letter-spacing: 1.4px; }
      .micro { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; }
    </style>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <rect width="1600" height="960" fill="url(#grid)"/>
  <rect width="1600" height="960" fill="url(#scan)"/>
  <rect width="1600" height="960" fill="url(#orbLeft)"/>
  <rect width="1600" height="960" fill="url(#orbMid)"/>
  <rect width="1600" height="960" fill="url(#orbRight)"/>

  <path d="M 36 72 L 72 36 H 1528 L 1564 72 V 888 L 1528 924 H 72 L 36 888 Z" fill="none" stroke="url(#frame)" stroke-opacity="0.55" stroke-width="2"/>
  <path d="M 80 112 H 280" stroke="#29d8ff" stroke-width="4" stroke-linecap="round" filter="url(#glowCyan)"/>
  <path d="M 1320 112 H 1520" stroke="#ffb84d" stroke-width="4" stroke-linecap="round" filter="url(#glowAmber)"/>

  <g>
    <text x="86" y="88" fill="#7aefff" class="mono kicker">PROXY ARCHITECTURE / NEON OPS</text>
    <text x="86" y="140" fill="#ffffff" class="sans hero">CODEX GATEWAY</text>
    <text x="86" y="176" fill="#9bdcf7" class="sans subtitle">Route LLM CLI egress through your VPS so auth, policy, and audit stay on your side.</text>
  </g>

  <g transform="translate(70 210)">
    <path d="M 0 28 L 28 0 H 382 L 410 28 V 586 L 382 614 H 28 L 0 586 Z" fill="url(#panelCyan)" stroke="#29d8ff" stroke-width="2" filter="url(#glowCyan)"/>
    <path d="M 0 88 H 410" stroke="#29d8ff" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="282" y="28" width="96" height="22" rx="11" fill="#07131d" stroke="#48e2ff" stroke-opacity="0.48"/>
    <text x="28" y="46" fill="#95f4ff" class="mono panel-tag">LOCAL // EDGE ENTRY</text>
    <text x="330" y="43" fill="#7aefff" class="mono micro" text-anchor="middle">LOCAL LOOP</text>
    <text x="28" y="72" fill="#dffcff" class="sans panel-note">Proxy-aware CLIs only see one local entry.</text>

    <rect x="28" y="124" width="354" height="122" rx="16" fill="url(#nodeCyan)" stroke="#67efff" stroke-width="1.6"/>
    <text x="48" y="162" fill="#ffffff" class="sans node-title">LLM CLI</text>
    <text x="48" y="194" fill="#a9eaff" class="sans node-copy">Claude Code / Codex / other CLI</text>
    <text x="48" y="220" fill="#7bdfff" class="mono node-meta">Only local HTTP(S)_PROXY</text>

    <path d="M 205 246 V 286" stroke="#73edff" stroke-width="3" stroke-linecap="round" filter="url(#glowCyan)"/>

    <rect x="28" y="286" width="354" height="122" rx="16" fill="url(#nodeCyan)" stroke="#67efff" stroke-width="1.6"/>
    <text x="48" y="324" fill="#ffffff" class="sans node-title">Proxy Wrapper</text>
    <text x="48" y="356" fill="#a9eaff" class="sans node-copy">Injects local proxy env vars</text>
    <text x="48" y="382" fill="#7bdfff" class="mono node-meta">One local entry, no remote topology</text>

    <path d="M 205 408 V 448" stroke="#73edff" stroke-width="3" stroke-linecap="round" filter="url(#glowCyan)"/>

    <rect x="28" y="448" width="354" height="122" rx="16" fill="url(#nodeCyan)" stroke="#67efff" stroke-width="1.6"/>
    <text x="48" y="486" fill="#ffffff" class="sans node-title">SSH Tunnel</text>
    <text x="48" y="516" fill="#a9eaff" class="sans node-copy">
      <tspan x="48" y="516">127.0.0.1:8080</tspan>
      <tspan x="48" dy="22">-&gt; VPS:127.0.0.1:8080</tspan>
    </text>
    <text x="48" y="562" fill="#7bdfff" class="mono node-meta">Encrypted hop, no public proxy</text>
  </g>

  <g transform="translate(520 170)">
    <path d="M 0 28 L 28 0 H 502 L 530 28 V 666 L 502 694 H 28 L 0 666 Z" fill="url(#panelPink)" stroke="#ff4fd8" stroke-width="2.2" filter="url(#glowPink)"/>
    <path d="M 0 96 H 530" stroke="#ff4fd8" stroke-opacity="0.36" stroke-width="1.5"/>
    <rect x="388" y="28" width="112" height="22" rx="11" fill="#180b28" stroke="#ff76e2" stroke-opacity="0.48"/>
    <text x="30" y="46" fill="#ffbaf2" class="mono panel-tag">VPS // CONTROL CORE</text>
    <text x="444" y="43" fill="#ffbaf2" class="mono micro" text-anchor="middle">CONTROL CORE</text>
    <text x="30" y="74" fill="#ffe2fb" class="sans panel-note">Egress, auth, policy, and audit converge here.</text>

    <rect x="30" y="126" width="470" height="136" rx="18" fill="#1b0f31" stroke="#ff7be6" stroke-width="1.8"/>
    <text x="56" y="168" fill="#ffffff" class="sans node-title">codex-gateway</text>
    <text x="56" y="204" fill="#f4c6ff" class="sans node-copy">Explicit proxy core / HTTP + CONNECT</text>
    <text x="56" y="232" fill="#d99df3" class="mono node-meta">Single-binary explicit proxy core</text>

    <path d="M 264 262 V 318" stroke="#ff79e5" stroke-width="3" stroke-linecap="round" filter="url(#glowPink)"/>

    <rect x="30" y="318" width="470" height="164" rx="18" fill="url(#nodeGreen)" stroke="#19f5b3" stroke-width="1.8"/>
    <text x="56" y="358" fill="#ffffff" class="sans node-title">Policy Gate</text>
    <text x="56" y="392" fill="#b9fff0" class="sans node-copy">Basic Auth / source IP / concurrency</text>
    <text x="56" y="420" fill="#9ff9e4" class="sans node-copy">Host / suffix / port allowlists</text>
    <text x="56" y="448" fill="#7be9cf" class="sans node-copy">DNS re-check blocks private IPs</text>

    <rect x="30" y="516" width="470" height="128" rx="18" fill="url(#nodeViolet)" stroke="#b388ff" stroke-width="1.7"/>
    <text x="56" y="556" fill="#ffffff" class="sans node-title">Audit Surface</text>
    <text x="56" y="590" fill="#ead7ff" class="sans node-copy">JSON audit logs /healthz /metrics</text>
    <text x="56" y="616" fill="#ccb0ff" class="mono node-meta">Decision traces and health stay on your side</text>
  </g>

  <g transform="translate(1120 210)">
    <path d="M 0 28 L 28 0 H 382 L 410 28 V 586 L 382 614 H 28 L 0 586 Z" fill="url(#panelAmber)" stroke="#ffb84d" stroke-width="2" filter="url(#glowAmber)"/>
    <path d="M 0 88 H 410" stroke="#ffb84d" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="262" y="28" width="110" height="22" rx="11" fill="#241308" stroke="#ffcf82" stroke-opacity="0.48"/>
    <text x="28" y="46" fill="#ffd699" class="mono panel-tag">UPSTREAM // MODEL CLOUD</text>
    <text x="317" y="43" fill="#ffd699" class="mono micro" text-anchor="middle">EGRESS LIST</text>
    <text x="28" y="72" fill="#fff0d2" class="sans panel-note">Only approved domains and ports get through.</text>

    <rect x="28" y="132" width="354" height="96" rx="16" fill="url(#nodeAmber)" stroke="#ffc76b" stroke-width="1.6"/>
    <text x="48" y="170" fill="#ffffff" class="sans node-title">Anthropic</text>
    <text x="48" y="198" fill="#ffdca3" class="sans provider-meta">.anthropic.com</text>

    <rect x="28" y="258" width="354" height="96" rx="16" fill="url(#nodeAmber)" stroke="#ffc76b" stroke-width="1.6"/>
    <text x="48" y="296" fill="#ffffff" class="sans node-title">OpenAI</text>
    <text x="48" y="324" fill="#ffdca3" class="sans provider-meta">.openai.com / .chatgpt.com</text>

    <rect x="28" y="384" width="354" height="96" rx="16" fill="url(#nodeAmber)" stroke="#ffc76b" stroke-width="1.6"/>
    <text x="48" y="422" fill="#ffffff" class="sans node-title">OpenRouter</text>
    <text x="48" y="450" fill="#ffdca3" class="sans provider-meta">.openrouter.ai</text>

    <rect x="28" y="510" width="354" height="56" rx="14" fill="#2b1908" stroke="#ffcf82" stroke-dasharray="6 8" stroke-width="1.4"/>
    <text x="48" y="545" fill="#ffdfac" class="sans provider-meta">Tight defaults, expand later</text>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M 478 520 C 515 520, 520 520, 552 520" stroke="#6ee7f9" stroke-width="4" marker-end="url(#arrowCyan)" filter="url(#glowCyan)"/>
    <path d="M 1052 520 C 1090 520, 1100 520, 1134 520" stroke="#ffb84d" stroke-width="4" marker-end="url(#arrowAmber)" filter="url(#glowAmber)"/>
  </g>

  <g>
    <text x="606" y="498" fill="#9bf0ff" class="mono flow-label">SSH TUNNEL</text>
    <text x="1154" y="498" fill="#ffd699" class="mono flow-label">ALLOWLIST EGRESS</text>
  </g>

  <g opacity="0.65">
    <circle cx="504" cy="520" r="5" fill="#6ee7f9" filter="url(#glowCyan)"/>
    <circle cx="1058" cy="520" r="5" fill="#ffb84d" filter="url(#glowAmber)"/>
  </g>

  <g>
    <text x="86" y="892" fill="#74d3f3" class="mono footer-label">LOCAL CLI</text>
    <text x="188" y="892" fill="#74d3f3" class="mono footer-label">-&gt;</text>
    <text x="228" y="892" fill="#ff99ea" class="mono footer-label">VPS GATE</text>
    <text x="348" y="892" fill="#ff99ea" class="mono footer-label">-&gt;</text>
    <text x="388" y="892" fill="#ffd08c" class="mono footer-label">MODEL APIs</text>
    <text x="1170" y="892" fill="#96f9dd" class="mono footer-label">AUTH / POLICY / AUDIT</text>
  </g>
</svg>

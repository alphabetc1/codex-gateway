# Copy to deploy/client.yaml and adjust values before running:
#   go run ./cmd/codex-gateway deploy client

service_name: codex-gateway-tunnel
wrapper_name: codex-gateway-proxy
# Optional: set to "system" for a system-level tunnel service when running as root.
# service_scope: system

ssh:
  user: admin
  host: your-vps.example.com
  port: 22
  server_alive_interval: 60
  server_alive_count_max: 3
  extra_args: []

tunnel:
  local_host: 127.0.0.1
  local_port: 8080
  remote_host: 127.0.0.1
  remote_port: 8080

proxy:
  username: alice
  password: change-me
  no_proxy:
    - localhost
    - 127.0.0.1
    - ::1

# Optional: define multiple VPS endpoints for client-side failover.
# Each endpoint needs a unique local tunnel port.
#
# endpoints:
#   - name: primary
#     ssh:
#       host: vps-1.example.com
#     tunnel:
#       local_port: 8080
#   - name: backup
#     ssh:
#       host: vps-2.example.com
#     tunnel:
#       local_port: 8081

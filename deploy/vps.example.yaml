# Copy to deploy/vps.yaml and adjust values before running:
#   go run ./cmd/codex-gateway deploy vps

project_root: .
binary_output: bin/codex-gateway
service_name: codex-gateway
# Optional: set to "system" when `systemd --user` is unavailable and you are deploying as root.
# service_scope: system

users:
  - username: alice
    password: change-me

runtime:
  proxy_listen_addr: 127.0.0.1
  proxy_listen_port: 8080
  admin_listen_addr: 127.0.0.1
  admin_listen_port: 9090
  source_allowlist_cidrs:
    - 127.0.0.1/32
    - ::1/128
  dest_port_allowlist:
    - 443
  dest_host_allowlist:
    - storage.googleapis.com
  dest_suffix_allowlist:
    - .claude.ai
    - .claude.com
    - .anthropic.com
    - .openai.com
    - .openrouter.ai
    - .chatgpt.com
  max_conns_per_ip: 128
  server_read_header_timeout: 10s
  server_idle_timeout: 90s
  upstream_dial_timeout: 10s
  upstream_tls_handshake_timeout: 10s
  upstream_response_header_timeout: 30s
  tunnel_idle_timeout: 10m
  max_header_bytes: 1048576
  log_level: info
  log_format: json
  access_log_enabled: true
  metrics_enabled: true

env_overrides: {}

# Optional: centralized Claude OAuth broker for `codex-gateway claude-client`.
# When enabled, the VPS holds the refresh token and serves short-lived access tokens
# via the admin listener.
claude_oauth:
  enabled: false
  refresh_token: ""
  # client_id: 9d1c250a-e61b-44d9-88ed-5944d1962f5e
  # token_url: https://platform.claude.com/v1/oauth/token
